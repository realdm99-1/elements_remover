<!DOCTYPE html>
<html>
<head>

  <title>Elements Remover</title>
  <link rel="stylesheet" href="styles.css">

<body class="popup">
  <h3>Elements Remover</h3>

  <button id="openOptions">Settings</button>

</body>
</html>
