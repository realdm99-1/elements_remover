<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Settings - Elements Remover</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="options">
  <div class="container">
    <header>
      <h1>Elements Remover</h1>
      <p class="subtitle">웹페이지에서 원치 않는 요소를 제거하는 규칙을 관리하세요.</p>
    </header>

    <section class="card main-form">
      <h2>새 규칙 추가</h2>
      <div class="input-grid">
        <div class="input-group">
          <label for="xpathInput">XPath</label>
          <div class="input-row">
            <input type="text" id="xpathInput" placeholder="예: //div[@class='ad']">
            <button id="addXpath" class="btn-primary">추가</button>
          </div>
        </div>
        <div class="input-group">
          <label for="classInput">Class</label>
          <div class="input-row">
            <input type="text" id="classInput" placeholder="예: some-ad-class">
            <button id="addClass" class="btn-primary">추가</button>
          </div>
        </div>
        <div class="input-group">
          <label for="idInput">ID</label>
          <div class="input-row">
            <input type="text" id="idInput" placeholder="예: some-ad-id">
            <button id="addId" class="btn-primary">추가</button>
          </div>
        </div>
      </div>
    </section>

    <section class="card list-section">
      <h2>현재 제거 규칙 목록</h2>
      <div id="emptyState" class="hidden">등록된 규칙이 없습니다.</div>
      <ul id="ruleList"></ul>
    </section>
  </div>
  <script src="options.js"></script>
</body>
</html>
